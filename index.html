<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src = "javascript.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class = "result">123456789</div>
        <div class = "ops">
            <div class = "row">
                <div class="char">CLEAR</div>
                <div class="char">DEL</div>
            </div>
            <div class="row">
                <div class="char">7</div>
                <div class="char">8</div>
                <div class="char">9</div>
                <div class="char">÷</div>
            </div>
            <div class = "row">
                <div class="char">4</div>
                <div class="char">5</div>
                <div class="char">6</div>
                <div class="char">×</div>                
            </div>
            <div class="row">
                <div class="char">1</div>
                <div class="char">2</div>
                <div class="char">3</div>
                <div class="char">-</div>                
            </div>
            <div class="row">
                <div class="char">.</div>
                <div class="char">0</div>
                <div class="char">=</div>
                <div class="char">+ </div>                
            </div>
        </div>
    </div>
</body>
</html>
