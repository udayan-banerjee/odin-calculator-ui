<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src = "javascript.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class = "result"></div>
        <div class = "ops">
            <div class = "row">
                <div class="char clr">CLEAR</div>
                <div class="char">DEL</div>
            </div>
            <div class="row">
                <div class="char num">7</div>
                <div class="char num">8</div>
                <div class="char num">9</div>
                <div class="char oper">/</div>
            </div>
            <div class = "row">
                <div class="char num">4</div>
                <div class="char num">5</div>
                <div class="char num">6</div>
                <div class="char oper">*</div>                
            </div>
            <div class="row">
                <div class="char num">1</div>
                <div class="char num">2</div>
                <div class="char num">3</div>
                <div class="char oper">-</div>                
            </div>
            <div class="row">
                <div class="char">.</div>
                <div class="char num">0</div>
                <div class="char ans">=</div>
                <div class="char oper">+</div>                
            </div>
        </div>
    </div>
</body>
</html>
